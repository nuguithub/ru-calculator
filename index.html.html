<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RU Calculator</title>
    <link rel="stylesheet" type="text/css" href="./style.css"></link>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RU Calculator</h1>
        </div>
        
        <div class="form">
            <div class="sections">
                <div class="section-1">
                    <div class="input-group">
                        <label for="numWorkloads">Number of Workloads</label>
                        <input type="number" id="numWorkloads" min="1" max="10" value="1" onchange="generateWorkloadInputs()">
                    </div>

                    <div id="workloadsContainer"></div>
                </div>

                <div class="section-2">
                    <div class="input-group">
                        <label>Hours in Duda University</label>
                        <div class="time-inputs">
                            <div class="time-field">
                                <input type="number" id="uniHours" value="6" min="0">
                                <div class="small-label">Hours</div>
                            </div>
                            <div class="time-field">
                                <input type="number" id="uniMinutes" value="0" min="0" max="59">
                                <div class="small-label">Minutes</div>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Break Time (Max 1.5 hours)</label>
                        <div class="time-inputs">
                            <div class="time-field">
                                <input type="number" id="breakHours" value="0" min="0" max="1">
                                <div class="small-label">Hours</div>
                            </div>
                            <div class="time-field">
                                <input type="number" id="breakMinutes" value="30" min="0" max="59">
                                <div class="small-label">Minutes</div>
                            </div>
                        </div>
                    </div>
                    <button onclick="calculateRU()">Calculate Total RU</button>

                    <div id="result" class="result">
                        <p style="color: #666; font-weight: 500;">Total Daily RU</p>
                        <div id="totalHours" class="total-hours">0 hrs</div>
                        <div id="status" style="font-size: 18px; margin: 12px 0;"></div>
                        
                        <div id="warning" class="warning">
                            ! Lampas RU mo! !
                        </div>
                    </div>
                </div>
            </div>

            
        </div>
        
        <div class="footer">
            BAWAL MANDAYA MGA BATA
        </div>
    </div>

    <script>
        function generateWorkloadInputs() {
            const num = parseInt(document.getElementById('numWorkloads').value) || 1;
            const container = document.getElementById('workloadsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= num; i++) {
                const div = document.createElement('div');
                div.className = 'workload-section';
                div.innerHTML = `
                    <div class="workload-title">Workload ${i}</div>
                    <div class="time-inputs">
                        <div class="time-field">
                            <input type="number" id="w${i}h" value="1" min="0">
                            <div class="small-label">Hours</div>
                        </div>
                        <div class="time-field">
                            <input type="number" id="w${i}m" value="0" min="0" max="59">
                            <div class="small-label">Minutes</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function calculateRU() {
            const numWorkloads = parseInt(document.getElementById('numWorkloads').value) || 1;

            // University hours
            const uniH = parseInt(document.getElementById('uniHours').value) || 0;
            const uniM = parseInt(document.getElementById('uniMinutes').value) || 0;
            const uniTotal = uniH + (uniM / 60);

            // Break time
            let breakH = parseInt(document.getElementById('breakHours').value) || 0;
            let breakM = parseInt(document.getElementById('breakMinutes').value) || 0;
            let breakTotal = breakH + (breakM / 60);

            if (breakTotal > 1.5) {
                breakTotal = 1.5;
                document.getElementById('breakHours').value = 1;
                document.getElementById('breakMinutes').value = 30;
            }

            let workloadsTotal = 0;
            for (let i = 1; i <= numWorkloads; i++) {
                const h = parseInt(document.getElementById(`w${i}h`).value) || 0;
                const m = parseInt(document.getElementById(`w${i}m`).value) || 0;
                workloadsTotal += h + (m / 60);
            }

            const totalHours = uniTotal + workloadsTotal + breakTotal;

            document.getElementById('result').style.display = 'block';
            document.getElementById('totalHours').textContent = totalHours.toFixed(1) + " hrs";

            const statusEl = document.getElementById('status');
            const warningEl = document.getElementById('warning');

            if (totalHours > 9) {
                statusEl.innerHTML = `<span style="color:#dc2626; font-weight:700;">SOBRA</span>`;
                warningEl.style.display = 'block';
            } else if (totalHours > 7.5) {
                statusEl.innerHTML = `<span style="color:#ea580c; font-weight:700;">YAN BERIGUD</span>`;
                warningEl.style.display = 'none';
            } else {
                statusEl.innerHTML = `<span style="color:#16a34a; font-weight:700;">KONTI NAMAN</span>`;
                warningEl.style.display = 'none';
            }
        }

        document.addEventListener('input', function(e) {
            if (e.target.tagName === 'INPUT') {
                calculateRU();
            }
        });

        window.onload = function() {
            generateWorkloadInputs();
            calculateRU();
        };
    </script>
</body>
</html>
